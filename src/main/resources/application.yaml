ktor:
  application:
    modules:
      - app.turnity.ApplicationKt.module
  deployment:
    port: ${LOCAL_PORT}:8080

database:
  url: ${DATABASE_URL}
  user: ${DATABASE_USER}
  password: ${DATABASE_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  issuer: ${JWT_ISSUER}
  audience: ${JWT_AUDIENCE}
  realm: ${JWT_REALM}
  tokenExpirationMinutes: ${JWT_EXPIRATION_MINUTES}

oauth:
  google:
    clientId: ${GOOGLE_CLIENT_ID}
    clientSecret: ${GOOGLE_CLIENT_SECRET}
    callbackUrl: ${GOOGLE_CALLBACK_URL}
